<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Projectiescherm</title>
    <style>
        body { 
            background-color: #ffffff; 
            text-align: center; 
            font-family: Helvetica, Arial, sans-serif; 
            margin: 0;
            padding-top: 10vh;
        }
        .room-banner {
            font-size: 24px;
            background-color: #222;
            color: white;
            padding: 15px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            font-weight: bold;
            transition: background-color 0.5s ease;
        }
        .room-code {
            color: #ffd700;
            font-size: 28px;
            letter-spacing: 2px;
        }
        .prev-label { font-size: 48px; color: #333; margin-top: 40px;}
        .prev-nums { font-size: 96px; min-height: 120px; color: #555; }
        .new-label { font-size: 48px; margin-top: 50px; color: #333; }
        .new-num { font-size: 384px; font-weight: bold; line-height: 1; margin-top: 10px; color: #000; }
    </style>
</head>
<body>
    <div class="room-banner" id="banner">
        Scherm Code: <span class="room-code" id="displayCodeDisplay">LOADING...</span>
    </div>

    <div class="prev-label">Vorige nummers:</div>
    <div class="prev-nums" id="prevNums"></div>
    
    <div class="new-label">Nieuw nummer:</div>
    <div class="new-num" id="newNum"></div>

    <script>
        const displayCode = "{{ display_code }}";

        async function updateState() {
            if (!displayCode) return;
            try {
                const res = await fetch(`/api/state/${displayCode}`);
                const data = await res.json();
                
                document.getElementById('newNum').innerText = data.last_number || '';
                document.getElementById('prevNums').innerText = data.previous_numbers.join(', ');
                
                const codeSpan = document.getElementById('displayCodeDisplay');
                const banner = document.getElementById('banner');
                
                if (data.operator_connected) {
                    codeSpan.innerText = "VERBONDEN";
                    codeSpan.style.color = "#00ff00";
                    banner.style.backgroundColor = "#114a1c";
                } else {
                    codeSpan.innerText = displayCode;
                    codeSpan.style.color = "#ffd700";
                    banner.style.backgroundColor = "#222";
                }
            } catch (err) {
                console.error("Error updating display state:", err);
            }
        }

        document.getElementById('displayCodeDisplay').innerText = displayCode;
        setInterval(updateState, 1000);
        updateState();
    </script>
</body>
</html>
