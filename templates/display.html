<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Projectiescherm</title>
    <style>
        body { 
            background-color: #ffffff; 
            text-align: center; 
            font-family: Helvetica, Arial, sans-serif; 
            margin: 0;
            padding-top: 10vh;
        }
        .room-banner {
            font-size: 24px;
            background-color: #222;
            color: white;
            padding: 15px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            font-weight: bold;
        }
        .room-code {
            color: #ffd700;
            font-size: 28px;
            letter-spacing: 2px;
        }
        .prev-label { font-size: 48px; color: #333; margin-top: 40px;}
        .prev-nums { font-size: 96px; min-height: 120px; color: #555; }
        .new-label { font-size: 48px; margin-top: 50px; color: #333; }
        .new-num { font-size: 384px; font-weight: bold; line-height: 1; margin-top: 10px; color: #000; }
    </style>
</head>
<body>
    <div class="room-banner">
        Room Code: <span class="room-code" id="roomCodeDisplay">LOADING...</span>
    </div>

    <div class="prev-label">Vorige nummers:</div>
    <div class="prev-nums" id="prevNums"></div>
    
    <div class="new-label">Nieuw nummer:</div>
    <div class="new-num" id="newNum"></div>

    <script>
        let roomCode = '';

        async function initializeRoom() {
            try {
                const res = await fetch('/api/create_room', { method: 'POST' });
                const data = await res.json();
                roomCode = data.room_code;
                document.getElementById('roomCodeDisplay').innerText = roomCode;
                
                // Begin polling the newly generated session
                setInterval(updateState, 1000);
                updateState();
            } catch (err) {
                document.getElementById('roomCodeDisplay').innerText = "ERROR CREATING ROOM";
                console.error("Room generation failed:", err);
            }
        }

        async function updateState() {
            if (!roomCode) return;
            try {
                const res = await fetch(`/api/state/${roomCode}`);
                if (res.status === 404) {
                    document.getElementById('roomCodeDisplay').innerText = "SESSION EXPIRED";
                    return;
                }
                const data = await res.json();
                document.getElementById('newNum').innerText = data.last_number || '';
                document.getElementById('prevNums').innerText = data.previous_numbers.join(', ');
            } catch (err) {
                console.error("Could not fetch display updates:", err);
            }
        }

        // Initialize on load
        initializeRoom();
    </script>
</body>
</html>
